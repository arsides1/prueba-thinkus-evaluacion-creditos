# =========================================================================
# ms-orquestador (BFF) | corre en 8080
# =========================================================================

quarkus.http.port=8080
quarkus.http.host=0.0.0.0
quarkus.http.root-path=/

# Indexar el modulo commons (Jandex). Sin esto Quarkus NO ve las
# anotaciones de Bean Validation de los DTOs en runtime y falla con
# HV000030: No validator could be found for constraint 'Positive'.
quarkus.index-dependency.commons.group-id=com.thinkus
quarkus.index-dependency.commons.artifact-id=commons

# --- Datasource Reactivo (Hibernate Reactive Panache para la app) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=thinkus_app
quarkus.datasource.password=thinkus_app_pwd
quarkus.datasource.reactive.url=postgresql://localhost:5432/prueba_thinkus
quarkus.datasource.reactive.max-size=20

# --- Datasource JDBC (solo para Flyway, que no soporta reactivo) ---
# Quarkus permite que ambos (jdbc + reactive) coexistan apuntando a la misma BD.
# El JDBC se usa exclusivamente al startup para correr migraciones.
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/prueba_thinkus
quarkus.datasource.jdbc.max-size=2

# --- Hibernate ---
# validate: Hibernate solo verifica que el schema coincida; Flyway es la unica
# fuente de verdad para crear/alterar tablas. Anti-patron usar 'update' en prod.
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.format-sql=true

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true

# --- REST Client al Microservicio B (Riesgos) ---
# El nombre 'riesgos-api' debe coincidir con el configKey del @RegisterRestClient
quarkus.rest-client.riesgos-api.url=http://localhost:8081
quarkus.rest-client.riesgos-api.connect-timeout=2000
quarkus.rest-client.riesgos-api.read-timeout=10000

# --- Politica crediticia (configurable, no hardcoded) ---
# Formula: APROBADO si score > umbral-score Y (deudaMensual + monto) < salario * porcentaje
app.politica.umbral-score=70
app.politica.porcentaje-capacidad-pago=0.40

# --- CORS para el frontend Angular ---
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Location
quarkus.http.cors.access-control-max-age=24H

# --- Logging ---
quarkus.log.level=INFO
quarkus.log.category."com.thinkus".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss.SSS} %-5p [%c{1.}] (%t) %s%e%n

# --- OpenAPI / Swagger UI ---
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
mp.openapi.extensions.smallrye.info.title=Microservicio A - Orquestador (BFF)
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Backend for Frontend que orquesta la evaluacion crediticia: valida la cedula, consulta el buro de riesgo (Microservicio B) en paralelo, aplica la politica crediticia y persiste el resultado.

# --- Profiles ---
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.log.category."com.thinkus".level=DEBUG

# Tests usan H2 in-memory para no depender de Postgres real.
# H2 reactivo no existe oficialmente, asi que en %test desactivamos Hibernate Reactive
# y usamos los servicios via mocks.
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.rest-client.riesgos-api.url=http://localhost:8089

%prod.quarkus.log.category."com.thinkus".level=INFO
%prod.quarkus.hibernate-orm.log.sql=false
