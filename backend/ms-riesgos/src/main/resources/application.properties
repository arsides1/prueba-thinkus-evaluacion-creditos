# =========================================================================
# ms-riesgos | mock crediticio
# Corre en 8081 (el orquestador toma 8080)
# =========================================================================

quarkus.http.port=8081
quarkus.http.host=0.0.0.0
quarkus.http.root-path=/

# Indexar el modulo commons (anotaciones @CedulaEC de Bean Validation
# no son visibles para Quarkus sin esto).
quarkus.index-dependency.commons.group-id=com.thinkus
quarkus.index-dependency.commons.artifact-id=commons

# Latencias inyectadas tal cual pide el enunciado.
# Las dejo configurables porque en %test las bajamos a 10ms (ver abajo)
# para que la suite de pruebas no demore minutos.
app.latencia.score-ms=2000
app.latencia.deudas-ms=1500

# Rangos para la generacion random de deudas
app.deudas.min=0
app.deudas.max=5
app.deudas.mensualidad-min=50
app.deudas.mensualidad-max=800

# CORS abierto al frontend (4200) y al orquestador (8080).
# No incluyo "*" porque al combinarse con allow-credentials Quarkus rechaza la config.
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200,http://localhost:8080
quarkus.http.cors.methods=GET,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.access-control-max-age=24H

quarkus.log.level=INFO
quarkus.log.category."com.thinkus".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss.SSS} %-5p [%c{1.}] (%t) %s%e%n

# OpenAPI / Swagger UI siempre expuesto (incluso fuera de dev) porque
# es justamente lo que el reviewer va a usar para probar el servicio.
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
mp.openapi.extensions.smallrye.info.title=Microservicio B - Riesgos Mock
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Mock que simula consultas a un buro de riesgo crediticio. Score y deudas por cedula con latencia simulada.

# --- Profiles ---
%dev.quarkus.log.category."com.thinkus".level=DEBUG
%test.app.latencia.score-ms=10
%test.app.latencia.deudas-ms=10
%prod.quarkus.log.category."com.thinkus".level=INFO
