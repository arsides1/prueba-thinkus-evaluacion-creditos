# =============================================================================
# Configuracion Nginx para servir la SPA Angular
# =============================================================================
# Notas:
#  - try_files con fallback a /index.html: necesario para Angular Router
#    en modo HTML5 (rutas como /historial sin hash).
#  - Cache agresivo para assets con hash en el nombre (que generan webpack/esbuild).
#  - Gzip activado para reducir transferencia.
# =============================================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresion gzip para texto
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml;

    # Cache largo para assets con hash (Angular outputHashing=all)
    location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback: cualquier ruta desconocida sirve index.html para que
    # Angular Router se encargue del routing client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Headers de seguridad basicos (no exhaustivos pero razonables)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
